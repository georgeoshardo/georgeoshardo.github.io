on: push
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: files.srcf.net
        username: gh464
        password: ${{ secrets.SRCF_FTP_PASSWORD }}
        port: 22
        local-dir: ./public/
        server-dir: /public/home/gh464/public_html/
        protocol: sftp